name: Build SERFCN Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache Theos
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/theos
        key: theos-${{ runner.os }}-v1

    - name: Install Theos
      run: |
        set -e
        if [ ! -d "${{ github.workspace }}/theos/bin" ]; then
          git clone --depth=1 https://github.com/theos/theos.git ${{ github.workspace }}/theos
          cd ${{ github.workspace }}/theos
          git submodule update --init --recursive --depth=1
        fi
        echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

    - name: Download iOS SDK
      run: |
        mkdir -p ${{ github.workspace }}/theos/sdks
        if [ ! -d "${{ github.workspace }}/theos/sdks/iPhoneOS16.5.sdk" ]; then
          curl -LO https://github.com/theos/sdks/releases/download/pre-2024-09-27/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz -C ${{ github.workspace }}/theos/sdks/
        fi

    - name: Install build tools
      run: brew install dpkg ldid

    - name: Build Tweak
      run: |
        export THEOS=${{ github.workspace }}/theos
        make clean
        make package FINALPACKAGE=1 ARCHS=arm64 THEOS_PACKAGE_SCHEME=rootless

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SERFCN-build
        path: |
          .theos/obj/**/*.dylib
          packages/*.deb
        if-no-files-found: warn
